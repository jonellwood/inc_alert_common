<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RedFive Relay — Standby</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        @keyframes flicker {

            0%,
            19%,
            21%,
            23%,
            25%,
            54%,
            56%,
            100% {
                opacity: 1;
            }

            20%,
            24%,
            55% {
                opacity: 0.3;
            }
        }

        @keyframes scanline {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 100%;
            }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.02) 0px,
                    rgba(255, 255, 255, 0.02) 1px,
                    transparent 2px,
                    transparent 3px);
            animation: scanline 2s linear infinite;
            pointer-events: none;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #ff2a2a;
            text-shadow:
                0 0 10px #ff2a2a,
                0 0 20px #ff2a2a,
                0 0 30px #ff2a2a;
            animation: flicker 2.5s infinite;
        }

        p {
            margin-top: 1rem;
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
        }

        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff2a2a;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 10px #ff2a2a;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(0.8);
                opacity: 0.6;
            }

            to {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="center">
        <h1>RED FIVE RELAY</h1>
        <p>Signal uplink initializing<span class="pulse"></span></p>
        <p style="margin-top:2rem;color:#444;">// transmission pending // standby for deployment //</p>
    </div>
</body>

</html>
